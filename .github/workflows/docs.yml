name: docs

# Verifies that gh-pages/public/ stays in sync with docs/ + the templates/CSS
# that wrap it. Pattern from rappture-monorepo's docs.yml: rebuild on every
# PR/push, fail if `git diff --quiet gh-pages/public/` shows changes — i.e.,
# the author forgot to rebuild before committing.
#
# GitHub Pages itself publishes from `main:/gh-pages/public` (Settings →
# Pages → Source), so this job's only role is consistency. Pages deployment
# happens automatically when the merge to main lands; this workflow does
# not push anything.

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'gh-pages/**'
      - '.github/workflows/docs.yml'
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'gh-pages/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

jobs:
  docs-fresh:
    name: gh-pages/public/ is up to date with sources
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"
          cache-dependency-path: gh-pages/requirements.txt

      - name: Install builder deps
        run: pip install -r gh-pages/requirements.txt

      - name: Rebuild gh-pages/public/
        run: python3 gh-pages/build_site.py

      - name: Fail if rebuild produced changes
        run: |
          if ! git diff --quiet gh-pages/public/; then
            echo "::error::gh-pages/public/ is out of sync with docs/ or gh-pages/ sources."
            echo "Run 'python3 gh-pages/build_site.py' locally and commit the result before pushing."
            git --no-pager diff --stat gh-pages/public/
            exit 1
          fi
